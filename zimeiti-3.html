      align-items: center;

      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    @media (max-width: 1024px) {
      .header-content {
        flex-direction: column;
        gap: 15px;
        padding: 15px 20px;
      }
      .ad-banner {
        width: 100%;
        max-width: 480px;
      }
      .ad-banner1 {

        max-width: 150px;
      }
      .ad-banner2 {

        max-width: 750px;

      .main-content {
        padding: 20px 15px;
      }
      .sidebar {
        width: 120px;
        padding: 15px;
      }
      .content-area {
        width: calc(100% - 160px);
        margin-left: 20px;
      }
      .nav-grid {
        grid-gap: 15px;
      }
      .nav-item {
        padding: 15px;
      }
    }
    @media (max-width: 768px) {
      .main-content {

      }
