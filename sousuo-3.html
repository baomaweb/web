    html, body {

    .container-wrapper {
      display: flex;

      min-height: 100vh;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }
    .main-content {
      display: flex;
      flex: 1;
      width: 100%;

      padding: 12px 0;

    .sidebar {
      width: 150px;

      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      flex-shrink: 0;
    }
    .content-area {
      width: 760px;
      margin-left: 15px;
      flex-shrink: 0;
    }
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-gap: 10px;
    }
    .nav-item {
      background: white;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .nav-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
    }
    .nav-icon {
      font-size: 24px;
      margin-bottom: 10px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background-color: #f1f5f9;
      color: #64748b;
      font-size: 14px;
      flex-shrink: 0;
    }
    .ad-banner {
      width: 480px;
      height: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    @media (max-width: 1024px) {
      .header-content {
        flex-direction: column;
        gap: 15px;
        padding: 15px 20px;
      }
      .ad-banner {
        width: 100%;
        max-width: 480px;
      }
      .ad-banner1 {
        width: 100%;
        max-width: 150px;
      }
      .ad-banner2 {
        width: 100%;
        max-width: 750px;
      }
      .main-content {
        padding: 20px 15px;
      }
      .sidebar {
        width: 120px;
        padding: 15px;
      }
      .content-area {
        width: calc(100% - 160px);
        margin-left: 20px;
      }
      .nav-grid {
        grid-gap: 15px;
      }
      .nav-item {
        padding: 15px;
      }
    }
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
        align-items: center;
      }
      .sidebar {
        width: 100%;
        max-width: 150px;
        margin-bottom: 20px;
      }
      .content-area {
        width: 100%;
        max-width: 760px;
        margin-left: 0;
      }
    }
